services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    env_file: ./agent/.env
    environment:
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      - livekit
    command: ["python", "voice_agent_configurable.py", "dev"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env
    ports:
      - "3001:3000"
    depends_on:
      - livekit
    restart: unless-stopped
    # Bind-mount source for hot reload; keep the image's (Linux) node_modules
    # via a named volume so the host's are not used inside the container.
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
